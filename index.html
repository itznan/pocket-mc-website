    <!-- JSON-LD: FAQPage Rich Snippet -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Does PocketMC require Java to be installed on my computer?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. PocketMC manages its own isolated Java runtimes using Adoptium. It will automatically download the correct Java version (8, 11, 17, 21, or 25) based on your server type and Minecraft version — without touching your system environment variables."
            }
          },
          {
            "@type": "Question",
            "name": "Can I let my friends join without port forwarding my router?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. PocketMC includes a built-in Playit.gg tunnel wizard. Just follow the 4-step setup, link your Playit.gg account, and PocketMC will provision a public tunnel address for your server — no router configuration or IT knowledge required."
            }
          },
          {
            "@type": "Question",
            "name": "Can Bedrock (console/mobile) players join a Java server managed by PocketMC?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes! PocketMC dynamically detects if your server has GeyserMC and Floodgate installed and shows a cross-play badge when they are active. Bedrock players on consoles, mobile, or Windows 10/11 can then join your Java server seamlessly."
            }
          },
          {
            "@type": "Question",
            "name": "Where are my server files stored? Does PocketMC upload anything to the cloud?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "All your server files live 100% on your local Windows machine. PocketMC only uploads data to cloud storage (Google Drive, Dropbox, OneDrive) when you explicitly configure and trigger a cloud backup. No data is ever sent anywhere without your consent."
            }
          },
          {
            "@type": "Question",
            "name": "Which server software types does PocketMC support?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "PocketMC supports: Vanilla Java (1.8.8+), PaperMC (1.8.8+), Fabric (1.14+), Forge (1.8.8+), NeoForge, Bedrock Dedicated Server (BDS, stable and preview), and PocketMine-MP (PHP-based, PM5)."
            }
          },
          {
            "@type": "Question",
            "name": "Is PocketMC free? Where can I download it?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, PocketMC is completely free and open source under the MIT License. You can download the latest release from GitHub: https://github.com/PocketMC/pocket-mc-windows/releases/latest"
            }
          }
        ]
      }
    </script>
